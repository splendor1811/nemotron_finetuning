_base_: ../base.yaml

rlvr:
  enabled: true
  algorithm: grpo
  learning_rate: 5.0e-7
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  num_generations: 32
  max_prompt_length: 1024
  max_completion_length: 2048
  temperature: 0.8
  num_train_epochs: 1
  kl_coef: 0.005
  max_grad_norm: 0.3
  reward_weights:
    correctness: 3.0
    format: 0.5
    reasoning_quality: 0.3
