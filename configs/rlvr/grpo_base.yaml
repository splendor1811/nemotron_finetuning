_base_: ../base.yaml

rlvr:
  enabled: true
  algorithm: grpo
  learning_rate: 1.0e-6
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_generations: 16
  max_prompt_length: 1024
  max_completion_length: 2048
  temperature: 0.7
  num_train_epochs: 2
  kl_coef: 0.001
  max_grad_norm: 0.5
  reward_weights:
    correctness: 3.0
    format: 1.0
    reasoning_quality: 0.5
